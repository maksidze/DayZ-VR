[openxr]
enabled=true
debug_layer=false
reference_space=local

[render]
mode=game
submit_when_unfocused=false

[gui]
# Main menu and inventory are captured separately and submitted as a world-locked
# OpenXR quad. The normal in-game HUD keeps using the existing rendering path.
quad_enabled=true
quad_pixel_width=1920
quad_pixel_height=1400
quad_width_meters=1.4
quad_distance=1.25
quad_vertical_offset=-0.10
# Keep HMD look active while the in-game inventory owns mouse input. Main-menu
# cursor mode is not affected.
inventory_hmd_look=true
# Fraction of HMD rotation used to keep the 3D character preview aligned with
# the world-locked inventory. Item previews follow the GUI without compensation.
inventory_preview_rotation_scale=0.5
inventory_player_preview_visible=true
# DayZ's Gauss post-process blur used behind the in-game inventory.
inventory_blur_enabled=false

[controls]
enabled=true
show_controller_axes=true
deadzone=0.30
# Relative mouse counts per frame at full horizontal right-stick deflection.
turn_scale=18.0

[logging]
level=debug
file=dayz_openxr.log

[hooks]
enabled=true
present=true
present1=true
resize_buffers=true

[stereo]
# Observation-only prerequisite for true per-eye rendering. It validates the exact
# DayZ build and records Camera/RenderContext prepare/execute/finalize ownership.
runtime_probe=true
alternate_eye=true
hmd_rotation=true
# Route HMD yaw/pitch through DayZ's native mouse camera so aim-ray, shots,
# player body and first-person weapon use exactly the rendered direction.
# Roll remains a render-only camera transform because mouse look has no roll.
hmd_native_aim=true
# Meters of DayZ camera translation per meter of physical HMD movement.
hmd_position_scale=1.0
# Absolute DayZ gameplay FOV in radians, applied only to the in-memory profile value.
# The .DayZProfile file is never modified. 0 disables the override.
game_fov=1.48353004
# Signed relative mouse counts per HMD radian. Change magnitude if head turning
# is too slow/fast; invert one sign if that axis moves in the wrong direction.
hmd_mouse_yaw_scale=-600
hmd_mouse_pitch_scale=-600
# Distance between the two game cameras in DayZ world units.
camera_separation=0.064
# Symmetric screen-space shift as a fraction of one eye image width.
# Positive values move the left image left and the right image right.
image_shift=0.0
# contain keeps aspect with bars; stretch fills the eye; cover crops to fill.
fit_mode=stretch
# Independent final image scale. Below 1 shrinks; above 1 crops/overscans.
scale_x=1.0
scale_y=1.0
# Native DayZ IGUIScale override. Stock fallback is 0.85.
override_hud_scale=false
hud_scale=0.70
hud_safe_width=0
hud_safe_height=0
# Experimental centered viewport for identifying the native HUD draw pass.
hud_composite_width=0
hud_composite_height=0
hud_left_offset_x=0
hud_right_offset_x=0
gui_mouse_remap=true
gui_cursor=true
# Optional square backbuffer override; disabled in the generic build config.
override_game_resolution=false
render_width=1600
render_height=1600
